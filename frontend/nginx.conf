server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to the backend.
    # docker-compose: backend resolves via Docker DNS (127.0.0.11)
    # Railway: VITE_API_URL is baked in at build time — browser calls backend
    #          directly, so this block is never hit in production.
    # Using a variable in proxy_pass forces lazy DNS resolution so nginx
    # won't crash at startup if "backend" is unresolvable (Railway).
    resolver 127.0.0.11 8.8.8.8 valid=5s ipv6=off;
    set $backend_url "http://backend:8000";

    location /api/ {
        proxy_pass         $backend_url/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}
